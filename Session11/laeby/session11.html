<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- step 0:  Load the jsPsych library and plugins -->
    <script src="https://unpkg.com/jspsych@8.2.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@2.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-canvas-keyboard-response@2.1.0"></script>
    <link href="https://unpkg.com/jspsych@8.2.3/css/jspsych.css" rel="stylesheet" type="text/css" >

    <title>Session 11</title>
</head>
<body>
        //Step 1: add script for experiment 

        // step 2: initiate jsPsych instance and assign to a variable 


        //Step 3:  build your timeline

        // Step 3.1: Define your stimulus object array
        // Step 3.2: Write ONE trial template
        // step 3.3: Link them together in a block 

        
 
        //Step 4: run your jsPsych

        <script>

// define STIMULI array for later

const flankerStimuli = [
  
  {stimulus: ">>>>>", direction: "left", congruent: true},
  {stimulus: "<<<<<", direction: "right", congruent: true},
  {stimulus: ">><>>", direction: "left", congruent: false},
  {stimulus: "<<><<", direction: "right", congruent: false},
  
]


// define main trial
 const flankerTrial = {
  type: jsPsychHtmlKeyboardResponse,
  choices: ["ArrowLeft","ArrowRight"],
  stimulus:function (){
    const stimulus = jsPsych.evaluateTimelineVariable("stimulus");
    console.log("stimulus", stimulus);
    
    const direction = jsPsych.evaluateTimelineVariable("direction")
    return `<p>${stimulus}</p>`
  },
  data: function (){
    
    return{
      task: "flanker", 
      condition: "direction",
      stimulus: jsPsych.evaluateTimelineVariable("stimulus"),
      direction: jsPsych.evaluateTimelineVariable("direction"),
      congruent: jsPsych.evaluateTimelineVariable("congruent")
      
        }
     },
     
     on_finish: function(data){
       //data.correct_key = data.direction === "red"?"f":"j"
       data.correctOrNot = data.response === "data.correct_key"
       
     }
  
  }
  


// put them together

const flankerBlock = {
  timeline: [flankerTrial],
  randomize_order: true,
  timeline_variables: flankerStimuli,
  repetitions: 20
  

}

jsPsych.run(flankerBlock)
        
        
        
        
        </script>
  



</body>
</html>
