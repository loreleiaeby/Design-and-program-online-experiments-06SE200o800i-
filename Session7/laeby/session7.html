<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- step 0:  Load the jsPsych library and plugins -->
    <script src="https://unpkg.com/jspsych@8.2.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@2.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-canvas-keyboard-response@2.1.0"></script>
    <link href="https://unpkg.com/jspsych@8.2.3/css/jspsych.css" rel="stylesheet" type="text/css" >

    <title>Session 7</title>
</head>
<body>
        //Step 1: add script for experiment 
  <script>
    const jsPsych = initJsPsych()
    const timeline = [];
const fixation = {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: "<h1>+</h1>",
    choices: "NO_KEYS",
    trial_duration: 1000
}

timeline.push(fixation);



const canvastrial = {
    type: jsPsychCanvasKeyboardResponse,
    canvas_size: [window.innerHeight, window.innerWidth],
    stimulus: function drawFn(canvas){
    const ctx = canvas.getContext("2d");
    console.dir(ctx);
    ctx.fillStyle="skyblue"
    ctx.fillRect(50, 50, 200, 50);
    ctx.strokeStyle = "peach";
    ctx.strokeRect(50, 50, 200, 50);
    ctx.clearRect(60, 60, 20, 20);
},
    choices: "ALL_KEYS",
    trial_duration: 4000
}

timeline.push(canvastrial);



    jsPsych.run(timeline);

  </script>



</body>
</html>
