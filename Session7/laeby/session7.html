  <script>
    const jsPsych = initJsPsych()
    const timeline = [];
const fixation = {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: "<h1>+</h1>",
    choices: "NO_KEYS",
    trial_duration: 3000
}

timeline.push(fixation);

function drawFn(canvas){
    const ctx = canvas.getContext("2d");
    console.dir(ctx);


}

const canvastrial = {
    type: jsPsychCanvasKeyboardResponse,
    canvas_size: [window.innerHeight, window.innerWidth],
    stimulus: //leaver empty for now,
    choices: "g",
    trial_duration: 5000
}

timeline.push(canvastrial);



    jsPsych.run(timeline);

  </script>
